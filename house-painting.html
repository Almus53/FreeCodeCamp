<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Paintinh</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            width: 100vw;
            background: linear-gradient(to bottom,cyan 60%,green 60%);
        }
        #house {
            position: relative;
            width: 500px;
            height: 400px;
            background-color: hsl(10, 60%, 70%);
            border: 7px solid hsl(10, 44%, 44%);
            margin: 150px auto;
        }
        #house > div {
            position: absolute;
        }
        #chimney {
            width: 100px;
            height: 200px;
            background-image:linear-gradient(to bottom,black 2px, transparent 2px);
            background-size: 100px 10px;
            background-color: white;
            border: 3px solid black;
            right: 10px;
            top: -150px;
            z-index: -1;
        }
        #roof {
            top: 0;
            width: 100%;
            height: 100px;
            border: 7px solid hsl(10, 44%, 44%);
            border-bottom: none;
            background-color: hsl(10, 60%, 70%);
            overflow: hidden;
        }
        .grid {
            width: 500px;
            height: 500px;
            background-image: linear-gradient(to right,hsl(10, 44%, 44%) 5px,transparent 2px),
                              linear-gradient(to bottom,hsl(10, 44%, 44%) 5px,transparent 2px);
            background-size: 20px 20px;
            rotate: 45deg;
            scale: 1.2;
            transform: translate(-100px,-100px);
        }
        #window-1,#window-2 {
            width: 120px;
            height: 120px;
            background-color: rgb(240, 255, 163);
            border: 5px solid hsl(10, 44%, 44%);
            background-image: linear-gradient(to right,
            transparent 0 47%,
            hsl(10, 44%, 44%) 47% 53%,
            transparent 53% 100%);
            top: 150px;
        }
        #window-1 {
            left: 30px;
        }
        #window-2 {
            right: 30px;
        }
        #door {
            background-color: lightgray;
            width: 150px;
            height: 250px;
            bottom: 0px;
            left: 168px;
            border: 5px solid gray;
        }
        .door-knob {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: gray;
            position: absolute;
            right: 3px;
            bottom: 100px;
        }
        .door-mat {
            width: 200px;
            height: 70px;
            background-color: lightgreen;
            position: absolute;
            bottom: -100px;
            left: -55px;
            transform: skewX(-30deg);
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="house">
        <div id="chimney"></div>
        <div id="roof">
            <div class="grid"></div>
        </div>
        <div id="window-1"></div>
        <div id="window-2"></div>
        <div id="door">
            <div class="door-knob"></div>
            <div class="door-mat">
                <h1>WELCOME</h1>
            </div>
        </div>
    </div>
</body>
</html>
