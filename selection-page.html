<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Page</title>
</head>
<style>
    * {
        padding: 0;
        margin: 0;
    }
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px;
        box-shadow: 0px 0px 6px black;
        width: fit-content;
        margin: 100px auto;
        border-radius: 10px;
        gap: 10px;
    }
    .feature-card-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        max-width: 600px;
        gap: 50px;
    }
    label {
        display: flex;
        flex-direction: column;
        border: 1px solid gray;
        border-radius: 5px;
        width: 250px;
        height: 100px;
        align-items: center;
        justify-content: center;
        position: relative;
        cursor: pointer;
        }
    label:hover {
        border: 1px solid orange;
        box-shadow: 0 0 5px orange;
        transition: all 0.3s;
    }    
    h2 {
        margin-bottom: 5px;
    } 
    input[type="checkbox"] {
        appearance: none;
        width:20px;
        height:20px;
        border: 1px solid gray;
        border-radius: 5px;
        position: absolute;
        right: 5px;
        top: 5px;
        transition: all 0.3s;
        background-color: whitesmoke;
        cursor: pointer;
    }
    input[type="checkbox"]:checked {
        background-color: orange;
        border: 1px solid orange;
    }
    input[type="checkbox"]:checked::after {
        content: "✓";
        color: white;
        font-weight: bold;
        margin: 0 3px;
    }
</style>
<body>
    <h1>Feature Selection</h1>
    <div class="feature-card-container">
        <label for="storage" class="feature-card">
            <input id="storage" type="checkbox">
            <h2>Cloud Storage</h2>
            100 Gigabyte secure storage
        </label>
        <label for="support" class="feature-card">
            <input id="support" type="checkbox">
            <h2>Dedicated Support</h2>
            24/7 customer help
        </label>
        <label for="analytics" class="feature-card">
            <input id="analytics" type="checkbox">
            <h2>Advanced Analytics</h2>
            Insights & reports
        </label>
        <label for="theme" class="feature-card">
            <input id="theme" type="checkbox">
            <h2>Custom User Themes</h2>
            Personalized dashboard design
        </label>
        <label for="collab" class="feature-card">
            <input id="collab" type="checkbox">
            <h2>Multi-User Collab</h2>
            Team access and sharing
        </label>
        <label for="api" class="feature-card">
            <input id="api" type="checkbox">
            <h2>API Access</h2>
            Integrate with your custom built tools
        </label>
    </div>
</body>
</html>
