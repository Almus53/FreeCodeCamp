<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <style>
        * {
            padding: 0px;
            margin: 0px;
            font-family: Arial,sans-serif;
        }
        .container {
            border-radius: 5px;
            box-shadow: 0px 5px 10px black; 
            padding: 50px 20px;
            max-width: 500px;
            margin: 50px auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        input,
        textarea,
        select {
            border: 1px solid black;
            border-radius: 3px;
            padding: 3px 10px;
            margin-bottom: 20px;
        }
        fieldset {
            padding: 10px;
            margin-bottom: 20px;
        }
        input:focus,
        textarea:focus {
            outline: none;
            border-color:yellowgreen;
        }
        input:valid,
        select:valid,
        textarea:valid {
            border-color: green;
        }
        input:invalid,
        select:invalid,
        textarea:invalid {
            border-color: red;
        } 
        .radio-group input[type="radio"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px solid black;
            vertical-align: bottom;
        }
        .radio-group input[type="radio"]:checked {
            border-color: green;
            background-color: green;
            box-shadow: 0px 0px 2px black;
        }
        .radio-group input[type="radio"]:checked + label {
            color: green;
        }
        input:first-of-type {
            border-radius: 5px;
        }
        button {
            padding: 10px;
            border: none;
            color: white;
            background-color: green;
             border-radius: 5px;
        }
        button:hover {
            background-color: rgba(0, 128, 0, 0.664);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Job Application Form</h1>
        <form>
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required 
            placeholder="Enter your name">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email"
            placeholder="Enter your email" required>
            <label for="position">Position:</label>
            <select id="position" required>
                <option value="" disabled selected>Select a position</option>
                <option value="Developer">Developer</option>
                <option value="Designer">Designer</option>
                <option value="Manager">Manager</option>
            </select>
            <fieldset class="radio-group">
                <legend>Availability:</legend>
                <input type="radio" id="full-time"
                 name="availability" value="full-time" checked>
                 <label for="full-time">Full-Time</label>
                 <input type="radio" id="part-time"
                 name="availability" value="part-time">
                 <label for="part-time">part-Time</label>
            </fieldset>
            <label for="message">Why do you want this job?</label>
            <textarea id="message" rows="3" cols="20"
            placeholder="Write your motivation" required></textarea>
            <button type="submit">Submit Application</button>
        </form>
    </div>
</body>
</html>
