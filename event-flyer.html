<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event-Flyer</title>
    <style>
        * {
            padding: 0px;
            margin: 0px;
            font-family: sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            padding-bottom: 50px;
            width: 100vw;
            margin: 0px auto;
            min-height: calc(100vh - 100px);
        }
        section {
          width: 100%;
        }
        body > p {
            text-align: center;
        }
        hr {
            width: 80%;
        }
    </style>
</head>
<body>
    <header>
        <img src="https://cdn.freecodecamp.org/curriculum/labs/event.jpg">
        <h1>Random Festival</h1>
        <p>Join us for the first annual Random Festival!</p>
        <p><b>When:</b> Dec 13th<b>Where:</b>Boulder Park</p>
    </header>
    <hr>
    <main>
        <section>
            <h2>Festival Highlights</h2>
            <ul>
                <li>Do Nothing</li>
                <li>Do more of Nothing</li>
            </ul>
        </section>
        <section>
            <h2>Special Guests</h2>
            <ul>
                <li>Elmo</li>
                <li>Bugs</li>
            </ul>
        </section>
        <section>
            <h2>Food Trucks</h2>
            <ul>
                <li>RnR Tacos</li>
                <li>cheesehell</li>
            </ul>
        </section>
        <hr>
        <p>© 2025 Pet Rock Festival</p>
    </main>
</body>
</html>
