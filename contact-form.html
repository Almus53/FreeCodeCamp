<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            background-color: hsl(200, 100%, 82%);
        }
        .form-container {
            background-color: whitesmoke;
            padding: 30px 20px;
            border-radius: 20px;
            width: 400px;
            margin: 100px auto;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            margin: 5px;
            width: 100%;
            display: block;
            text-align: center;
            color: rgb(44, 44, 44);
            font-size: 20px;
        }
        input,textarea {
            padding:5px;
            display: block;
            width: 70%;
            margin: 0 auto 50px;
            height: 2em;
        }
        textarea {
            height: 10em;
        }
        button {
            background-color: navy;
            color: white;
            padding: 10px 20px;
            font-size: 20px;
            transition: background-color 0.3s;
            cursor: pointer;
            margin: 5px auto;
            display: block;
        }
        button:hover {
            background-color: rgba(0, 0, 128, 0.795);
        }
    </style>
</head>
<body>
    <div class="form-container">
        <form>
            <h2>Contact Us</h2>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input id="email" type="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" required>
            </textarea>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
